name: Daily Social Data Fetch

on:
  schedule:
    - cron: "0 11 * * *"   # 6 AM EST = 11:00 UTC
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies
        run: pip install google-api-python-client praw pandas google-auth-httplib2 google-auth-oauthlib

      - name: Run Pipeline
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          YOUTUBE_KEYS_JSON: ${{ secrets.YOUTUBE_KEYS_JSON }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
        run: python run_batch2.py

      # ⭐ NEW — Upload CSV outputs so you can download to your local machine ⭐
      - name: Upload CSV output
        uses: actions/upload-artifact@v4
        with:
          name: social-output
          path: "*.csv"

      # --- Email on success ---
      - name: Email (success)
        if: ${{ success() }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "✅ Social pipeline succeeded — ${{ github.repository }}"
          to: ${{ secrets.GMAIL_USER }}
          from: Social Pipeline <${{ secrets.GMAIL_USER }}>
          body: |
            ✅ Success

            Repo: ${{ github.repository }}
            Run:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # --- Email on failure ---
      - name: Email (failure)
        if: ${{ failure() }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "❌ Social pipeline failed — ${{ github.repository }}"
          to: ${{ secrets.GMAIL_USER }}
          from: Social Pipeline <${{ secrets.GMAIL_USER }}>
          body: |
            ❌ Failed

            Repo: ${{ github.repository }}
            Run:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Check the Actions logs for errors.
